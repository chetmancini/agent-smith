name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.25"

      - name: Install lint dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq
          npm install --global markdownlint-cli

      - name: Install shfmt 3.13.0
        run: |
          go install mvdan.cc/sh/v3/cmd/shfmt@v3.13.0
          sudo cp "$(go env GOPATH)/bin/shfmt" /usr/local/bin/shfmt
          shfmt --version

      - name: Install shellcheck 0.11.0
        run: |
          curl -fsSL "https://github.com/koalaman/shellcheck/releases/download/v0.11.0/shellcheck-v0.11.0.linux.x86_64.tar.xz" -o /tmp/shellcheck.tar.xz
          echo "8c3be12b05d5c177a04c29e3c78ce89ac86f1595681cab149b65b97c4e227198  /tmp/shellcheck.tar.xz" | sha256sum -c -
          tar -xJf /tmp/shellcheck.tar.xz -C /tmp
          sudo cp /tmp/shellcheck-v0.11.0/shellcheck /usr/local/bin/shellcheck
          shellcheck --version

      - name: Validate skill file format
        shell: bash
        run: |
          set -euo pipefail
          for file in skills/*/SKILL.md; do
            echo "Checking ${file}"
            awk '
              NR == 1 { if ($0 != "---") exit 1 }
              NR > 1 && $0 == "---" { end=1; exit }
              !end && /^name:[[:space:]]+/ { name=1 }
              !end && /^description:[[:space:]]+/ { desc=1 }
              END { exit !(name && desc && end) }
            ' "$file" || {
              echo "Invalid skill frontmatter in ${file}" >&2
              exit 1
            }
          done

      - name: Validate JSON files
        run: |
          find . -name '*.json' -not -path './.git/*' -print0 | xargs -0 -n1 jq empty

      - name: Lint shell scripts
        run: shellcheck -x -P SCRIPTDIR hooks/*.sh hooks/lib/*.sh scripts/*.sh scripts/lib/*.sh tests/setup_suite.bash

      - name: Check shell formatting
        run: shfmt -d hooks/*.sh hooks/lib/*.sh scripts/*.sh scripts/lib/*.sh tests/setup_suite.bash

      - name: Lint Markdown
        run: markdownlint README.md commands/**/*.md skills/**/*.md

      - name: Lint GitHub Actions
        uses: rhysd/actionlint@914e7df21a07ef503a81201c76d2b11c789d3fca # v1.7.12

  bats:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bats jq sqlite3

      - name: Run Bats test suite
        run: |
          bats --print-output-on-failure \
            tests/lib/metrics.bats \
            tests/hooks/security.bats \
            tests/hooks/integration.bats \
            tests/scripts/schema_tools.bats \
            tests/scripts/run_agent_skill.bats \
            tests/scripts/release.bats \
            tests/scripts/codex_hook_layout.bats

  app-checks:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        check:
          - format
          - lint
          - typecheck
          - test
          - build
          - pack:check

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.6

      - name: Install standalone app dependencies
        working-directory: agent-smith-app
        run: bun install --frozen-lockfile

      - name: Run standalone app ${{ matrix.check }}
        working-directory: agent-smith-app
        run: bun run ${{ matrix.check }}

  opencode-checks:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        check:
          - typecheck
          - test
          - build

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.6

      - name: Install OpenCode plugin dependencies
        working-directory: opencode-plugin
        run: bun install --frozen-lockfile

      - name: Run OpenCode plugin ${{ matrix.check }}
        working-directory: opencode-plugin
        run: bun run ${{ matrix.check }}
